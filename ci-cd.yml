nname: Java CI with Maven

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build Project
      run: mvn clean install

    - name: Run Tests
      run: mvn test

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jar-file
        path: target/*.jar